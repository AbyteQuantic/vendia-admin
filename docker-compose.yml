services:
  admin-web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BACKEND_URL: http://host.docker.internal:8089
    ports:
      - "3099:3099"
    environment:
      - BACKEND_URL=http://host.docker.internal:8089
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
